<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #0f172a; }
      .emoji { fill: #facc15; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #020617; }
      .emoji { fill: #facc15; }
    }
    text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif, emoji;
    }
  </style>
  <rect class="background" width="180" height="180" rx="40" />
  <text
    x="50%"
    y="50%"
    dominant-baseline="central"
    text-anchor="middle"
    font-size="96"
  >
    💰
  </text>
</svg>